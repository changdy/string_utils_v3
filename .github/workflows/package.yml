name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/StrToolkit/StrToolkit.csproj"

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  version:
    name: Detect version change
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_package: ${{ steps.version.outputs.should_package }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and compare project version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          project="src/StrToolkit/StrToolkit.csproj"
          version="$(sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' "$project" | head -n 1)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid or missing semantic version in $project: $version"
            exit 1
          fi

          previous=""
          should_package="false"
          should_release="false"
          tag="v$version"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            should_package="true"
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && ! "$before" =~ ^0+$ ]]; then
              previous="$(git show "$before:$project" 2>/dev/null |
                sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' |
                head -n 1 || true)"
            fi

            if [[ "$version" != "$previous" ]]; then
              should_package="true"
              should_release="true"
            elif ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              # Retry a release whose earlier packaging run failed before
              # creating its tag.
              should_package="true"
              should_release="true"
            fi
          fi

          if [[ "$should_release" == "true" ]] && git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "::error::Tag $tag already exists at $tagged_commit instead of $GITHUB_SHA"
              exit 1
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_package=$should_package" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

          {
            echo "### Version detection"
            echo "- Current: \`$version\`"
            echo "- Previous: \`${previous:-not available}\`"
            echo "- Package: \`$should_package\`"
            echo "- Release: \`$should_release\`"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-web-assets:
    name: Prepare web assets
    needs: version
    if: needs.version.outputs.should_package == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Prepare JSON preview assets
        run: node scripts/prepare-web-assets.mjs --output .web-assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: .web-assets
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  package:
    name: Package ${{ matrix.label }}
    needs:
      - version
      - prepare-web-assets
    if: needs.version.outputs.should_package == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86
            os: windows-2022
            rid: win-x86
            artifact: StrToolkit-Setup-win-x86
            archive: StrToolkit-Setup-win-x86.exe
            format: inno
          - label: macOS ARM64
            os: macos-15
            rid: osx-arm64
            artifact: StrToolkit-osx-arm64
            archive: StrToolkit-osx-arm64.tar.gz
            format: tar
          - label: macOS Intel x64
            os: macos-15-intel
            rid: osx-x64
            artifact: StrToolkit-osx-x64
            archive: StrToolkit-osx-x64.tar.gz
            format: tar
          - label: Linux x64
            os: ubuntu-24.04
            rid: linux-x64
            artifact: StrToolkit-linux-x64
            archive: StrToolkit-linux-x64.tar.gz
            format: tar

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download prepared web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: .web-assets

      - name: Publish ${{ matrix.rid }}
        run: >-
          dotnet publish src/StrToolkit/StrToolkit.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PrepareWebAssetsOnPublish=false
          -o publish/${{ matrix.rid }}

      - name: Copy prepared web assets
        shell: pwsh
        run: |
          $output = "publish/${{ matrix.rid }}"
          Copy-Item -LiteralPath ".web-assets/jsonhero-frontend" -Destination $output -Recurse -Force
          Copy-Item -LiteralPath ".web-assets/json-crack" -Destination $output -Recurse -Force
          Copy-Item `
            -LiteralPath ".web-assets/versions.json" `
            -Destination (Join-Path $output "web-assets-versions.json") `
            -Force

      - name: Verify published files
        shell: pwsh
        run: |
          $output = "publish/${{ matrix.rid }}"
          $executable = if ($IsWindows) { "StrToolkit.exe" } else { "StrToolkit" }
          $required = @(
            (Join-Path $output $executable),
            (Join-Path $output "jsonhero-frontend/index.html"),
            (Join-Path $output "json-crack/editor.html"),
            (Join-Path $output "web-assets-versions.json")
          )
          foreach ($path in $required) {
            if (!(Test-Path -LiteralPath $path)) {
              throw "Required published file is missing: $path"
            }
          }

      - name: Create Windows installer
        if: matrix.format == 'inno'
        shell: pwsh
        run: |
          $isccCandidates = @(
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6/ISCC.exe"),
            (Join-Path $env:ProgramFiles "Inno Setup 6/ISCC.exe")
          )
          $iscc = $isccCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (!$iscc) {
            throw "Inno Setup compiler was not found on the runner"
          }

          [xml]$project = Get-Content "src/StrToolkit/StrToolkit.csproj"
          $versionNode = Select-Xml -Xml $project -XPath "/Project/PropertyGroup/Version" |
            Select-Object -First 1
          $version = $versionNode.Node.InnerText
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to read the application version from StrToolkit.csproj"
          }

          $publishDir = (Resolve-Path "publish/${{ matrix.rid }}").Path
          $outputDir = (New-Item -ItemType Directory -Path artifacts -Force).FullName
          & $iscc `
            "/DMyAppVersion=$version" `
            "/DPublishDir=$publishDir" `
            "/DOutputDir=$outputDir" `
            "installer/windows/StrToolkit.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE"
          }

      - name: Create tar.gz archive
        if: matrix.format == 'tar'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -C "publish/${{ matrix.rid }}" -czf "artifacts/${{ matrix.archive }}" .

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - version
      - package
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: StrToolkit-*
          path: release-assets
          merge-multiple: true

      - name: Verify release packages
        shell: bash
        run: |
          required=(
            StrToolkit-Setup-win-x86.exe
            StrToolkit-osx-arm64.tar.gz
            StrToolkit-osx-x64.tar.gz
            StrToolkit-linux-x64.tar.gz
          )
          for archive in "${required[@]}"; do
            test -f "release-assets/$archive" || {
              echo "Missing release package: $archive" >&2
              exit 1
            }
          done

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: v${{ needs.version.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
